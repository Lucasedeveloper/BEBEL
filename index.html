<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Páscoa, Maria Isabel ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #1a002a, #000 70%);
  overflow: hidden;
  font-family: 'Segoe UI', sans-serif;
  position: relative;
}

.welcome-banner {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: linear-gradient(to bottom, #ffcc00, #ff9900);
  color: white;
  text-align: center;
  padding: 14px 0;
  font-family: 'Dancing Script', cursive;
  font-size: 2.3rem;
  font-weight: 700;
  text-shadow: 0 0 12px #fff, 0 0 25px #ff6600;
  z-index: 10000;
  transition: opacity 1.2s ease-out;
}
.welcome-banner.hidden { opacity: 0; pointer-events: none; }
.welcome-banner small { display: block; font-size: 1.4rem; margin-top: 4px; color: #fff; }

.gift-screen {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: radial-gradient(circle, #2a0040, #000 80%);
  z-index: 9999;
  cursor: pointer;
  color: white;
  font-size: 20px;
  text-align: center;
}
.gift { 
  font-size: 120px; 
  animation: float 2.2s infinite ease-in-out;
  margin-bottom: 20px;
}
@keyframes float { 
  0%,100%{transform:translateY(0);} 
  50%{transform:translateY(-20px);} 
}

canvas { position: fixed; inset: 0; z-index: 0; }

.container { 
  position: relative; 
  width: 92vw; 
  max-width: 480px; 
  height: 580px; 
  z-index: 1; 
}

.heart { 
  width: 100%; 
  height: 100%; 
  animation: pulse 2.8s infinite ease-in-out; 
  filter: drop-shadow(0 0 45px rgba(255,0,120,.7)); 
}
@keyframes pulse { 
  0%,100%{transform:scale(1);} 
  50%{transform:scale(1.06);} 
}

.content { 
  position: absolute; 
  top: 50%; left: 50%; 
  transform: translate(-50%, -50%); 
  width: 88%; 
  max-width: 350px; 
  text-align: center; 
}

.text { 
  color: #fff; 
  font-size: 14.5px; 
  <!-- aqui 15.5 -->
  line-height: 1.9; 
  min-height: 150px;
  <!--180 -->
  white-space: pre-line;
  text-shadow: 0 1px 3px rgba(0,0,0,0.6);
}

.highlight {
  font-weight: 900;
  font-size: 21px;
  text-shadow: 
    -1px -1px 0 #000,  
     1px -1px 0 #000,
    -1px  1px 0 #000,
     1px  1px 0 #000,
     0    0   4px rgba(0,0,0,0.7);
}

.final {
  display: flex;
  justify-content: center;
  gap: 6px;
  min-height: 82px;
  flex-wrap: wrap;
  margin-top: 15px;
}

.final span {
  font-size: 54px;
  font-weight: 900;
  opacity: 0;
  transform: scale(0.6);
  transition: all .7s ease;
}

.signature {
  margin-top: 35px;
  color: #00ffff;
  font-family: 'Dancing Script', cursive;
  font-size: 46px;
  font-weight: 700;
  letter-spacing: 3px;
  opacity: 0;
  min-height: 70px;
  text-shadow: 
    0 0 15px #00ffff,
    0 0 30px #00ffff,
    2px 2px 0 #000,
    -2px -2px 0 #000,
    2px -2px 0 #000,
    -2px 2px 0 #000;
  transition: opacity 1s ease;
}
.signature.show { opacity: 1; }

.signature span {
  display: inline-block;
  opacity: 0;
  transform: translateY(15px);
  animation: signaturePop .6s forwards;
}
@keyframes signaturePop { 
  to { opacity: 1; transform: translateY(0); } 
}

.music-popup {
  position: fixed;
  top: 100px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: rgba(0,0,0,.8);
  padding: 12px 24px;
  border-radius: 30px;
  color: #fff;
  font-size: 15px;
  letter-spacing: 1px;
  opacity: 0;
  z-index: 10000;
  backdrop-filter: blur(8px);
  transition: all .6s ease;
}
.music-popup.show { 
  opacity: 1; 
  transform: translateX(-50%) translateY(0); 
}
</style>
</head>
<body>

<div class="welcome-banner" id="welcomeBanner">
  Feliz Páscoa, Maria Isabel! 🐰🌷
  <small>Que sua Páscoa seja tão doce quanto você ❤️</small>
</div>

<div class="gift-screen" id="giftScreen">
  <div class="gift">🎁</div>
  <div>Clique para abrir o presente</div>
</div>

<canvas id="particles"></canvas>
<audio id="bg-music" preload="none"></audio>
<div class="music-popup" id="musicPopup"></div>

<div class="container">
  <svg class="heart" viewBox="0 0 512 512">
    <defs>
      <radialGradient id="g" cx="50%" cy="40%" r="70%">
        <stop offset="0%" stop-color="#ff8fcf"/>
        <stop offset="50%" stop-color="#ff2d75"/>
        <stop offset="100%" stop-color="#b3003c"/>
      </radialGradient>
    </defs>
    <path d="M256 460 C120 350,40 260,40 170 C40 90,100 50,160 50 C210 50,240 80,256 110 C272 80,302 50,352 50 C412 50,472 90,472 170 C472 260,392 350,256 460Z" fill="url(#g)"/>
  </svg>

  <div class="content">
    <div class="text" id="typed"></div>
    <div class="final" id="final"></div>
    <div class="signature" id="signature"></div>
  </div>
</div>

<script>
// ===== PLAYLIST E REGISTRO (mantido igual) =====
const webhookURL = "https://script.google.com/macros/s/AKfycbxO_M-fNsp0ad4FlJfej9W6unv1Kbby1902FnTs3M04sribkuJDwQVranzzL3hn1OI05Q/exec";

let musicasTocadas = [];

async function registrarAcesso(tipo, musicaAtual = null) {
  let musicaInicial = "";
  if (tipo === "🎁 Abriu o presente" && typeof currentIndex !== 'undefined' && savedOrder) {
    const primeira = savedOrder[currentIndex];
    if (primeira) musicaInicial = primeira.replace(".mp3", "").replace(/_/g, " ");
  }
  if (musicaAtual) {
    const nome = musicaAtual.replace(".mp3", "").replace(/_/g, " ");
    if (!musicasTocadas.includes(nome)) musicasTocadas.push(nome);
  }

  const dados = {
    tipo, 
    data: new Date().toLocaleString('pt-BR'), 
    navegador: navigator.userAgent, 
    plataforma: navigator.platform, 
    tela: `${screen.width} × ${screen.height}`, 
    idioma: navigator.language, 
    referrer: document.referrer || "Acesso direto", 
    musica_inicial: musicaInicial, 
    musicas_tocadas: musicasTocadas.join(" → ") || "Nenhuma ainda"
  };

  try { await fetch(webhookURL, {method:"POST", mode:"no-cors", body:JSON.stringify(dados)}); } catch(e){}
}

const playlist = ["Die_with_a_smile.mp3","Meu_abrigo.mp3","Amo_noite_e_dia.mp3","Esperando_na_janela.mp3", "Garotas_nao_merecem_chorar.mp3"];
const music = document.getElementById("bg-music");
const musicPopup = document.getElementById("musicPopup");

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let savedOrder = JSON.parse(localStorage.getItem("musicOrder"));
let currentIndex = parseInt(localStorage.getItem("musicIndex"));
let lastTrack = localStorage.getItem("lastTrack");
if(!savedOrder){savedOrder=shuffle([...playlist]);currentIndex=0;}
if(isNaN(currentIndex)||currentIndex>=savedOrder.length){savedOrder=shuffle([...playlist]);currentIndex=0;}

function playMusic(i){const t=savedOrder[i];music.src=t;music.volume=0.65;music.play().catch(()=>{});showMusicPopup(t);registrarAcesso("Música começou a tocar",t);localStorage.setItem("musicIndex",i+1);localStorage.setItem("musicOrder",JSON.stringify(savedOrder));localStorage.setItem("lastTrack",t);}
function showMusicPopup(t){const n=t.replace(".mp3","").replace(/_/g," ");musicPopup.textContent="🎵 Agora tocando: "+n;musicPopup.classList.add("show");setTimeout(()=>musicPopup.classList.remove("show"),4500);}

music.addEventListener("ended",()=>{let n=parseInt(localStorage.getItem("musicIndex"));let o=JSON.parse(localStorage.getItem("musicOrder"));if(isNaN(n)||n>=o.length){o=shuffle([...playlist]);n=0;localStorage.setItem("musicOrder",JSON.stringify(o));}playMusic(n);});

const giftScreen = document.getElementById("giftScreen");
giftScreen.addEventListener("click",()=>{registrarAcesso("🎁 Abriu o presente");document.getElementById("welcomeBanner").classList.add("hidden");giftScreen.style.display="none";playMusic(currentIndex);setTimeout(type,800);},{once:true});

window.addEventListener("load",()=>registrarAcesso("Acesso à página"));

// ===== MENSAGENS =====
const msg = [
  "Meu amor, nesta Páscoa eu agradeço por você existir que ",
  "A luz da ressurreição ilumine o seu caminho",
  "Renovando em nós um amor sincero e verdadeiro, ",
  "Infinito como o carinho que sinto por você.",
  "Abençoada seja sua vida, hoje e sempre. Siga",
  "Iluminando meus dias com seu sorriso e ",
  "Sendo a razão de tantas alegrias no meu coração. É um",
  "Amor que cresce a cada instante.",
  "Bênçãos de Deus sobre nós dois, e ",
  "Eternamente quero cuidar de você, minha ",
  "Linda, especial e única Bebel."
];

const typed = document.getElementById("typed");
const finalBox = document.getElementById("final");
const signatureBox = document.getElementById("signature");

let caps = [], line = 0, char = 0;

function type() {
  if (line < msg.length) {
    if (char < msg[line].length) {
      const span = document.createElement("span");
      span.textContent = msg[line][char];
      if (char === 0) {
        const colors = ["#ff4dff","#c084fc","#7df9ff","#e66cfb","#ffd166","#2336e1","#ff4dff","#c084fc","#7df9ff","#e66cfb","#ffd166"];
        span.style.color = colors[line % colors.length];
        span.className = "highlight";
        caps.push(span);
      }
      typed.appendChild(span);
      char++;
      setTimeout(type, 52);
    } else {
      typed.appendChild(document.createElement("br"));
      line++;
      char = 0;
      setTimeout(type, 260);
    }
  } else {
    setTimeout(animateMARIAISABEL, 1400);
  }
}

// ===== ANIMAÇÃO "MARIA ISABEL" CORRIGIDA =====
function animateMARIAISABEL() {
  const word = "MARIA";
  const word2 = "ISABEL";
  const targets = [];

  // cria duas linhas
  const line1 = document.createElement("div");
  const line2 = document.createElement("div");

  line1.style.display = "flex";
  line2.style.display = "flex";
  line1.style.justifyContent = "center";
  line2.style.justifyContent = "center";
  line1.style.gap = "6px";
  line2.style.gap = "6px";
  line1.style.width = "100%";
  line2.style.width = "100%";

  finalBox.appendChild(line1);
  finalBox.appendChild(line2);

  // MARIA
  for (let i = 0; i < word.length; i++) {
    const t = document.createElement("span");
    t.textContent = word[i];
    const color = caps[i % caps.length] ? getComputedStyle(caps[i % caps.length]).color : "#ff8fcf";
    t.style.color = color;
    t.style.textShadow = `0 0 15px ${color}, 0 0 35px ${color}`;
    line1.appendChild(t);
    targets.push(t);
  }

  // ISABEL
  for (let i = 0; i < word2.length; i++) {
    const t = document.createElement("span");
    t.textContent = word2[i];
    const color = caps[i % caps.length] ? getComputedStyle(caps[i % caps.length]).color : "#ff8fcf";
    t.style.color = color;
    t.style.textShadow = `0 0 15px ${color}, 0 0 35px ${color}`;
    line2.appendChild(t);
    targets.push(t);
  }

  setTimeout(() => {
    caps.forEach((original, i) => {
      if (!original) return;

      const start = original.getBoundingClientRect();
      const end = targets[i % targets.length].getBoundingClientRect();

      const clone = original.cloneNode(true);
      document.body.appendChild(clone);
      clone.style.position = "fixed";
      clone.style.left = start.left + "px";
      clone.style.top = start.top + "px";
      clone.style.zIndex = "100";
      clone.style.transition = "all 2.4s cubic-bezier(0.25,0.8,0.25,1)";

      const dx = end.left - start.left + 10;
      const dy = end.top - start.top;

      requestAnimationFrame(() => {
        clone.style.transform = `translate(${dx}px, ${dy}px) scale(2.9)`;
      });

      setTimeout(() => {
        clone.remove();
        targets[i % targets.length].style.opacity = 1;
        targets[i % targets.length].style.transform = "scale(1)";
      }, 2450);
    });

    setTimeout(showSignature, 3300);
  }, 400);
}

function showSignature() {
  signatureBox.classList.add("show");
  signatureBox.innerHTML = "";
  
  const text = "Lucas ";
  let index = 0;
  
  function typeLetter() {
    if (index < text.length) {
      const span = document.createElement("span");
      span.textContent = text[index];
      signatureBox.appendChild(span);
      index++;
      setTimeout(typeLetter, 140);
    } else {
      const heart = document.createElement("span");
      heart.textContent = "❤";
      heart.style.color = "#ff3366";
      heart.style.marginLeft = "8px";
      signatureBox.appendChild(heart);
    }
  }
  typeLetter();
}

// ===== PARTÍCULAS =====
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
let w, h, parts = [];

function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

for(let i=0; i<95; i++){
  parts.push({x:Math.random()*w, y:Math.random()*h, r:Math.random()*2.2+0.8, s:Math.random()*0.45+0.25});
}

function draw(){
  ctx.clearRect(0,0,w,h);
  ctx.fillStyle="rgba(255,255,255,0.88)";
  parts.forEach(p=>{ 
    ctx.globalAlpha=0.8;
    ctx.beginPath(); 
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2); 
    ctx.fill(); 
    p.y-=p.s; 
    if(p.y<0) p.y=h; 
  });
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
